<div>
    <form #register="ngForm" (ngSubmit)="onSubmit(register.value)">
        <div class="form-group">
            <label for="inputNombre">Nombre : </label>
            <input type="string" class="form-control" id="inputNombre" aria-describedby="emailHelp" placeholder="Ingrese su Nombre">
        </div>
        <div class="form-group">
            <label for="inputDni">Dni : </label>
            <input type="string" class="form-control" id="inputDni" aria-describedby="emailHelp" placeholder="Ingrese su Dni">
        </div>
        <div class="form-group">
            <label for="inputEmail">Direccion Email: </label>
            <input type="email" class="form-control" id="inputEmail" aria-describedby="emailHelp" placeholder="Ingrese su email">
        </div>

        <div>
            <label for="inputPass">Contrasena: </label>
            <input type="password" class="form-control" id="inputPass" placeholder="Introduzca su Contraseña">
        </div>

        <button type="submit" class="btn btn-primary"> Registrarse </button>

    </form>
</div>
