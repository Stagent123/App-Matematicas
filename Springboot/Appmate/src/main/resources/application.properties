#Propiedades Server 
spring.application.name=Appmate
server.port=8080


# Configuración Base de datos H2
spring.datasource.url=jdbc:h2:mem:appmatedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

#Config Consola h2
spring.h2.console.enable=true
spring.h2.console.path=/h2-console

#Otros
## 'update' crea las tablas si no existen o las modifica si agregas campos
spring.jpa.hibernate.ddl-auto=update
# Esto muestra el código SQL que Spring genera en tu consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
